sonar.organization=solven-eu
sonar.projectKey=adhoc

sonar.java.source=21

# wildcards are not allowed in `sonar.sources` and `sonar.tests`
# Let's focus on Adhoc query engine for now
# We want to exclude modules like experimental, jmh, calcite (which is itself experimental)
sonar.sources=./adhoc/src/main/java,./model/src/main/java,./libraries/fsst/src/main/java,./libraries/encoding/src/main/java,./libraries/cell/src/main/java,./libraries/dataframe/src/main/java,./libraries/filters/src/main/java,./libraries/measures/src/main/java
sonar.tests=./adhoc/src/test/java,./model/src/test/java,./libraries/fsst/src/test/java,./libraries/encoding/src/test/java,./libraries/cell/src/test/java,./libraries/dataframe/src/test/java,./libraries/filters/src/test/java,./libraries/measures/src/test/java

# https://stackoverflow.com/questions/46976567/please-provide-compiled-classes-of-your-project-with-sonar-java-binaries
sonar.java.binaries=./**/target/classes
sonar.coverage.jacoco.xmlReportPaths=./**/target/site/jacoco/jacoco.xml,./**/target/site/jacoco-it/jacoco.xml,./**/target/site/jacoco-aggregate/jacoco.xml