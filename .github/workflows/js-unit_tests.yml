name: JS Unit (ViTest) Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions: read-all

jobs:
  test:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Package the server to serve API and JS
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
    # Workflow-scoped cache avoids cross-workflow cache pollution.
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
    - name: Cache Maven local repository
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.m2/repository
        key: maven-js-unit-tests-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-js-unit-tests-${{ runner.os }}-
    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version: lts/*
    - name: Install NPM dependencies
      working-directory: ./pivotable/js
      run: npm ci
    - name: Run ViTest tests
      working-directory: ./pivotable/js
      run: npm run unit_tests_ci
    - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
      if: always()
      with:
        name: vitest-report
        path: pivotable/js/vitest-report/
        retention-days: 30
