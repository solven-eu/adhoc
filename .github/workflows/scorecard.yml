# OpenSSF Scorecard — automated security best-practices audit
# Documentation: https://github.com/ossf/scorecard-action
# Results are published to the GitHub Security dashboard (SARIF) and
# to the public Scorecard API: https://securityscorecards.dev

name: Scorecard

on:
  push:
    branches: [ "master" ]
  # Run weekly so the score stays fresh even without code changes
  # (e.g. when upstream dependency scores change)
  schedule:
    - cron: '30 1 * * 6'

# Restrict all tokens to read-only by default; individual jobs
# can escalate only the permissions they actually need.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required to upload SARIF results to GitHub Code Scanning
      security-events: write
      # Required by ossf/scorecard-action to publish results via OIDC
      id-token: write

    steps:
      - name: "Checkout code"
        # persist-credentials: false prevents the token from leaking to
        # subprocesses, which is a Scorecard check in itself
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        # https://github.com/ossf/scorecard-action
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results pushes the score to the public Scorecard API
          # and enables the dynamic badge at securityscorecards.dev
          publish_results: true

      - name: "Upload artifact"
        # Keep the raw SARIF file as a workflow artifact for local inspection
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        # Surfaces Scorecard findings in GitHub → Security → Code scanning alerts
        # https://docs.github.com/en/code-security/code-scanning
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: results.sarif
