# Stepdown Rule checker — reports methods whose callees are declared above them.
# Informational only: the job never fails the build (exit code is always 0).
# See scripts/check-stepdown.pl and CONVENTIONS.MD for the rule definition.

name: Stepdown Rule

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions: read-all

jobs:
  stepdown:
    name: Stepdown Rule
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Stepdown checker
        # Exit code from the script is ignored (|| true) so the job never blocks a PR.
        # Violations are visible in the step log.
        run: |
          perl scripts/check-stepdown.pl \
            adhoc/src/main/java \
            libraries/src/main/java \
            public/src/main/java \
            || true
