name: AI Code Quality Agent

on:
  schedule:
    - cron: '0 4 * * 1'  # weekly on Monday at 04:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which jobs to run'
        type: choice
        options:
          - all
          - format-only
          - ai-only
        default: all
      target_module:
        description: 'Restrict Claude to one Maven module (e.g. public). Leave empty for all modules.'
        required: false
        default: ''

permissions: read-all

jobs:

  # ── Job 1 ── Apply deterministic formatters (Spotless + Prettier) ──────────
  auto-format:
    name: Auto-format (Spotless + Prettier)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the agent branch
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scope != 'ai-only' }}
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
      # Workflow-scoped cache avoids cross-workflow cache pollution.
      # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
      - name: Cache Maven local repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-ai-quality-format-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-ai-quality-format-${{ runner.os }}-

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - name: Install NPM dependencies
        working-directory: ./pivotable/js
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create agent branch (local only — pushed only if changes are made)
        run: git checkout -b "ai-quality-agent/nightly-${{ github.run_id }}"

      - name: Format JS with Prettier
        working-directory: ./pivotable/js
        run: npm run format

      - name: Apply Spotless
        run: mvn spotless:apply --file pom.xml --batch-mode

      - name: Detect and commit changes
        id: detect-changes
        run: |
          BRANCH="ai-quality-agent/nightly-${{ github.run_id }}"
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore: auto-format via Spotless and Prettier [skip ci]"
            git push origin "$BRANCH"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2 ── AI-powered improvements via Claude Code CLI ───────────────────
  ai-review:
    name: AI code quality improvements
    needs: auto-format
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push commits onto the agent branch
    if: ${{ !failure() && !cancelled() && (github.event_name != 'workflow_dispatch' || github.event.inputs.scope != 'format-only') }}
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Switch to agent branch (create if ai-only mode)
        run: |
          BRANCH="ai-quality-agent/nightly-${{ github.run_id }}"
          if git fetch origin "$BRANCH" 2>/dev/null; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: temurin
      # Workflow-scoped cache avoids cross-workflow cache pollution.
      # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
      - name: Cache Maven local repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-ai-quality-review-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-ai-quality-review-${{ runner.os }}-

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: lts/*

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.70

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compile project (gives Claude full context)
        run: mvn package -Pfast --file pom.xml --batch-mode -q

      - name: Build Claude prompt
        # CLAUDE.md (auto-loaded by the CLI) carries all conventions and constraints.
        # CONVENTIONS.MD is the authoritative list of rules this agent enforces.
        # This prompt only needs to specify the target scope for this run.
        run: |
          MODULE="${{ github.event.inputs.target_module }}"
          if [ -n "$MODULE" ]; then
            SCOPE="${MODULE}/src/main/java"
          else
            SCOPE="src/main/java"
          fi

          cat > /tmp/claude-prompt.txt << EOF
          Apply the code quality improvements described in CONVENTIONS.MD to Java source files
          under ${SCOPE} (non-test files only). Do NOT commit.

          PASS 1 — Grep-detectable fixes (Collections & Logging):
          1. Read CONVENTIONS.MD to understand every improvement category.
          2. Run these grep patterns across ${SCOPE} and score files by hit count:
               "new HashMap\b"           ->  LinkedHashMap  (CONVENTIONS.MD: Ordered mutability)
               "new HashSet\b"           ->  LinkedHashSet  (CONVENTIONS.MD: Ordered mutability)
               "List\.of\("             ->  ImmutableList.of  (CONVENTIONS.MD: Immutability first)
               "Set\.of\("              ->  ImmutableSet.of   (CONVENTIONS.MD: Immutability first)
               "Collectors\.toMap\b"    ->  PepperStreamHelperHacked.toLinkedMap or 4-arg form  (CONVENTIONS.MD: Ordered mutability)
               "Collectors\.groupingBy\b" ->  check for LinkedHashMap::new 3rd arg  (CONVENTIONS.MD: Ordered mutability)
               "log\.\w+\(.*\+"         ->  SLF4J {} placeholder  (CONVENTIONS.MD: Logging)
          3. Edit the highest-scoring files (do NOT read a file before selecting it).
          4. While editing, stay alert for recurring anti-patterns not yet in CONVENTIONS.MD.

          PASS 2 — Method ordering (Stepdown Rule, requires reading the file):
          This pass cannot be driven by grep. Instead:
          1. Run: git log --diff-filter=M --name-only -50 -- ${SCOPE}
             Collect the recently-touched non-test .java files (these are highest priority
             because they are actively being worked on and may have just had methods added).
          2. For each candidate file (up to 10), read it and check whether it follows the
             Stepdown Rule from CONVENTIONS.MD: entry-point methods appear before the methods
             they call; callees are placed directly below their first caller; visibility does
             not drive ordering.
          3. If a file violates the rule, reorder its methods to comply. Do not change any
             method body, signature, or field. Only reorder.

          DISCOVERIES FILE:
          After finishing all edits, write (or overwrite) .github/ai-quality-discoveries.md
          with every pattern you encountered during this run — whether it was already in
          CONVENTIONS.MD or newly discovered. For each entry record:
            - Pattern name / short description
            - Example: one representative file + line
            - Occurrences found (approximate count)
            - Status: "applied" | "known (already in CONVENTIONS.MD)" | "skipped — needs human review"
            - For "skipped" entries: a one-line rationale explaining why you did not auto-apply it
          This file is committed with the PR so a human reviewer can promote confirmed patterns
          to CONVENTIONS.MD or discard false positives.
          EOF

      - name: Run Claude AI review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        # --max-turns caps token consumption so the session ends gracefully before hitting
        # the daily rate limit. continue-on-error ensures the commit step still runs even
        # if Claude exits early (e.g. rate-limited), preserving any partial work.
        continue-on-error: true
        run: claude --dangerously-skip-permissions --max-turns 30 -p "$(cat /tmp/claude-prompt.txt)"

      - name: Re-apply Spotless (safety net for any formatter drift)
        run: mvn spotless:apply --file pom.xml --batch-mode

      - name: Detect and commit changes
        id: detect-changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore: AI code quality improvements via Claude [skip ci]"
            git push origin HEAD
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify static analysis (fail fast before opening a PR)
        # Mirrors what static-analysis.yml does on every PR. Running it here avoids
        # opening a PR that would immediately have a red CI status requiring human intervention.
        run: mvn package -DskipTests -Dspotless.skip=true --file pom.xml --batch-mode

  # ── Job 3 ── Open a PR if either job produced changes ──────────────────────
  open-pr:
    name: Open PR
    needs: [auto-format, ai-review]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write  # required by gh label create
    if: ${{ !failure() && !cancelled() && (needs.auto-format.outputs.changed == 'true' || needs.ai-review.outputs.changed == 'true') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master

      - name: Create ai-agent label (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ai-agent \
            --color 8B5CF6 \
            --description "Changes made by the AI code quality agent" \
            || true

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-quality-agent/nightly-${{ github.run_id }}"
          gh pr create \
            --title "chore: AI code quality improvements (run ${{ github.run_id }})" \
            --body "## Summary

          Automated PR from the [AI Code Quality Agent](https://github.com/solven-eu/adhoc/actions/runs/${{ github.run_id }}) (run \`${{ github.run_id }}\`).

          ### Changes may include (per [CONVENTIONS.MD](../CONVENTIONS.MD))
          - Auto-formatting via Spotless (Java) and Prettier (JS/TS)
          - Javadoc added to public classes / interfaces that had none
          - **Immutability first**: \`List.of()\` / \`Set.of()\` replaced with Guava \`ImmutableList.of()\` / \`ImmutableSet.of()\`; \`Collectors.toSet()\` replaced with \`ImmutableSet.toImmutableSet()\`
          - **Ordered mutability**: \`HashMap\` → \`LinkedHashMap\`, \`HashSet\` → \`LinkedHashSet\`; \`Collectors.toMap\` → \`PepperStreamHelperHacked.toLinkedMap\`; \`Collectors.groupingBy\` with \`LinkedHashMap::new\`
          - **Logging**: SLF4J \`{}\` placeholders instead of string concatenation
          - **Method ordering**: recently-touched files reordered to follow the Stepdown Rule (entry points first, callees below their first caller)

          ### Review checklist
          - [ ] CI passes (Build, Spotless, Static Analysis)
          - [ ] No unintended logic changes
          - [ ] Javadoc is accurate and meaningful
          - [ ] Review \`.github/ai-quality-discoveries.md\` — promote confirmed new patterns to \`CLAUDE.md\`, discard false positives
          " \
            --base master \
            --head "$BRANCH" \
            --label ai-agent
