name: mkdocs
on:
  push:
    branches:
      - master
      - main
# contents: write is required to push the generated site to the gh-pages branch.
# See https://github.com/mkdocs/mkdocs/blob/master/docs/user-guide/deploying-your-docs.md
permissions: read-all
jobs:
  deploy:
    name: mkdocs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email adhoc-mkdocs+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - run: pip install mkdocs-material==9.7.5 "mkdocs<2"
      - run: mkdocs gh-deploy --force
