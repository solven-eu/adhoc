# Generates a CycloneDX SBOM via the cyclonedx-maven-plugin (bound to the verify phase)
# and scans it with Grype for known vulnerabilities. Results are uploaded as a SARIF file
# so they appear in the GitHub Security → Code scanning tab.
#
# Runs on every push to master and on every PR targeting master.

name: SBOM + Grype vulnerability scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read
  security-events: write   # needed by github/codeql-action/upload-sarif

jobs:
  grype:
    name: Generate SBOM & scan with Grype
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up JDK 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Cache Maven local repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: maven-grype-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-grype-${{ runner.os }}-

    # Generate the SBOM. -Pfast skips tests and static analysis; the cyclonedx plugin
    # is bound to verify so we need at least that phase. JaCoCo is skipped explicitly
    # because -Pfast sets maven.test.skip but JaCoCo's check goal still runs.
    - name: Generate CycloneDX SBOM
      run: mvn verify -Pfast -Djacoco.skip=true --file pom.xml --batch-mode

    - name: Scan SBOM with Grype
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
      id: grype
      with:
        sbom: target/bom.json
        fail-build: false          # advisory: don't block PRs yet, just surface findings
        output-format: sarif

    - name: Upload Grype SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
      with:
        sarif_file: ${{ steps.grype.outputs.sarif }}
