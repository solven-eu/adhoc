# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Benchmarks

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
    # Workflow-scoped cache avoids cross-workflow cache pollution.
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
    - name: Cache Maven local repository
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.m2/repository
        key: maven-benchmarks-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-benchmarks-${{ runner.os }}-
    - name: Download dependencies
      run: mvn dependency:collect --file pom.xml --batch-mode
      # This is useful not to clutter the package command with download logs
      # `mvn dependency` has issues with multi-modules
      # run: mvn dependency:resolve dependency:resolve-plugins --batch-mode
    - name: Package skipping tests
      run: mvn package -Pfast --file pom.xml --batch-mode
    - name: Java ONLY benchmarks
      # Stick to `package` phase for consistency, and checking packaging is fine
      run: mvn package -Pnostyle -Pbenchmark-only --file pom.xml --batch-mode
