name: AI Code Quality Agent

on:
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which jobs to run'
        type: choice
        options:
          - all
          - format-only
          - ai-only
        default: all
      target_module:
        description: 'Restrict Claude to one Maven module (e.g. public). Leave empty for all modules.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write  # required by gh label create

jobs:

  # ── Job 1 ── Apply deterministic formatters (Spotless + Prettier) ──────────
  auto-format:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.scope != 'ai-only' }}
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install NPM dependencies
        working-directory: ./pivotable/js
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push agent branch
        run: |
          BRANCH="ai-quality-agent/nightly-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

      - name: Format JS with Prettier
        working-directory: ./pivotable/js
        run: npm run format

      - name: Apply Spotless
        run: mvn spotless:apply --file pom.xml --batch-mode

      - name: Detect and commit changes
        id: detect-changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore: auto-format via Spotless and Prettier [skip ci]"
            git push origin HEAD
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2 ── AI-powered improvements via Claude Code CLI ───────────────────
  ai-review:
    needs: auto-format
    runs-on: ubuntu-latest
    if: ${{ !failure() && !cancelled() && (github.event_name != 'workflow_dispatch' || github.event.inputs.scope != 'format-only') }}
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Switch to agent branch (create if ai-only mode)
        run: |
          BRANCH="ai-quality-agent/nightly-${{ github.run_id }}"
          if git fetch origin "$BRANCH" 2>/dev/null; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
            git push origin "$BRANCH"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compile project (gives Claude full context)
        run: mvn package -Pfast --file pom.xml --batch-mode -q

      - name: Build Claude prompt
        # CLAUDE.md (auto-loaded by the CLI) carries all conventions and constraints.
        # This prompt only needs to specify the target scope for this run.
        run: |
          MODULE="${{ github.event.inputs.target_module }}"
          if [ -n "$MODULE" ]; then
            SCOPE="${MODULE}/src/main/java"
          else
            SCOPE="src/main/java"
          fi

          cat > /tmp/claude-prompt.txt << EOF
          Apply the code quality improvements described in CLAUDE.md to at most 20 Java source
          files under ${SCOPE} (non-test files only). Do NOT commit.
          EOF

      - name: Run Claude AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: claude --dangerously-skip-permissions -p "$(cat /tmp/claude-prompt.txt)"

      - name: Re-apply Spotless (safety net for any formatter drift)
        run: mvn spotless:apply --file pom.xml --batch-mode

      - name: Verify static analysis (fail fast before opening a PR)
        # Mirrors what static-analysis.yml does on every PR. Running it here avoids
        # opening a PR that would immediately have a red CI status requiring human intervention.
        run: mvn package -DskipTests -Dspotless.skip=true --file pom.xml --batch-mode

      - name: Detect and commit changes
        id: detect-changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "chore: AI code quality improvements via Claude [skip ci]"
            git push origin HEAD
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 3 ── Open a PR if either job produced changes ──────────────────────
  open-pr:
    needs: [auto-format, ai-review]
    runs-on: ubuntu-latest
    if: ${{ !failure() && !cancelled() && (needs.auto-format.outputs.changed == 'true' || needs.ai-review.outputs.changed == 'true') }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Create ai-agent label (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ai-agent \
            --color 8B5CF6 \
            --description "Changes made by the AI code quality agent" \
            || true

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-quality-agent/nightly-${{ github.run_id }}"
          gh pr create \
            --title "chore: AI code quality improvements (run ${{ github.run_id }})" \
            --body "## Summary

          Automated PR from the [AI Code Quality Agent](https://github.com/solven-eu/adhoc/actions/runs/${{ github.run_id }}) (run \`${{ github.run_id }}\`).

          ### Changes may include
          - Auto-formatting via Spotless (Java) and Prettier (JS/TS)
          - Javadoc added to public classes / interfaces that had none
          - Unordered collections (\`HashSet\`, \`HashMap\`) replaced with \`LinkedHashSet\` / \`LinkedHashMap\`
          - \`List.of()\` / \`Set.of()\` replaced with Guava \`ImmutableList.of()\` / \`ImmutableSet.of()\`
          - SLF4J log statements fixed to use \`{}\` placeholders instead of string concatenation

          ### Review checklist
          - [ ] CI passes (Build, Spotless, Static Analysis)
          - [ ] No unintended logic changes
          - [ ] Javadoc is accurate and meaningful
          " \
            --base master \
            --head "$BRANCH" \
            --label ai-agent
