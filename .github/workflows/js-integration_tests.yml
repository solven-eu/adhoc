name: JS Integration (Playwright) Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions: read-all

jobs:
  test:
    name: JS Integration (Playwright) Tests [${{ matrix.server-variant }}]
    timeout-minutes: 30
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - server-variant: webflux
            maven-module: ':pivotable-server'
            npm-script: pw_localhost8080
          - server-variant: webmvc
            maven-module: ':pivotable-server-webmvc'
            npm-script: pw_localhost8080-webmvc

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Package the server to serve API and JS
    - name: Set up JDK 25
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '25'
        distribution: 'temurin'
    # Workflow-scoped cache avoids cross-workflow cache pollution.
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
    - name: Cache Maven local repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: maven-js-integration-tests-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-js-integration-tests-${{ runner.os }}-
    - name: Install Adhoc Server [${{ matrix.server-variant }}]
      # `install` so that each module is available in local repository, as later mvn command will not be executed on the root
      run: mvn install -Pfast -pl ${{ matrix.maven-module }} -am
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: lts/*
    - name: Install NPM dependencies
      working-directory: ./pivotable/js
      run: npm ci
    - name: Cache Playwright browsers
      # Playwright browser binaries (~300 MB) are keyed on the lockfile so the
      # cache is invalidated automatically when the Playwright version changes.
      # See https://playwright.dev/docs/ci#caching-browsers
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pivotable/js/package-lock.json') }}
    - name: Install Playwright Browsers
      working-directory: ./pivotable/js
      # --with-deps installs browser binaries + required OS packages.
      # Skip on cache hit: binaries are restored, OS packages are pre-installed on ubuntu-latest.
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      working-directory: ./pivotable/js
      run: npm run ${{ matrix.npm-script }}
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: playwright-report-${{ matrix.server-variant }}
        path: pivotable/js/playwright-report/
        retention-days: 30
