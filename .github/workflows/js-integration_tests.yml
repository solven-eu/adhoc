name: JS Integration (Playwright) Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions: read-all

jobs:
  test:
    name: JS Integration (Playwright) Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    # Package the server to serve API and JS
    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21'
        distribution: 'temurin'
    # Workflow-scoped cache avoids cross-workflow cache pollution.
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
    - name: Cache Maven local repository
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.m2/repository
        key: maven-js-integration-tests-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-js-integration-tests-${{ runner.os }}-
    - name: Install Adhoc Server
      # `install` so that each module is available in local repository, as later mvn command will not be executed on the root
      run: mvn install -Pfast -pl :pivotable-server -am
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: lts/*
    - name: Install NPM dependencies
      working-directory: ./pivotable/js
      run: npm ci
    - name: Cache Playwright browsers
      # Playwright browser binaries (~300 MB) are keyed on the lockfile so the
      # cache is invalidated automatically when the Playwright version changes.
      # See https://playwright.dev/docs/ci#caching-browsers
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('pivotable/js/package-lock.json') }}
    - name: Install Playwright Browsers
      working-directory: ./pivotable/js
      # --with-deps installs browser binaries + required OS packages.
      # Skip on cache hit: binaries are restored, OS packages are pre-installed on ubuntu-latest.
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      working-directory: ./pivotable/js
      run: npm run pw_localhost8080
    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: playwright-report
        path: pivotable/js/playwright-report/
        retention-days: 30
