name: AI Coverage Agent

on:
  schedule:
    - cron: '0 4 * * 1'  # weekly on Monday at 04:00 UTC
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Restrict Claude to one Maven module (e.g. adhoc, public). Leave empty for all modules.'
        required: false
        default: ''

permissions: read-all

jobs:

  # ── Job 1 ── AI-powered coverage improvements via Claude Code CLI ──────────
  ai-coverage:
    name: AI coverage improvements
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to push the agent branch
    outputs:
      changed: ${{ steps.detect-changes.outputs.changed }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: temurin
      # Workflow-scoped cache avoids cross-workflow cache pollution.
      # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
      - name: Cache Maven local repository
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.m2/repository
          key: maven-ai-coverage-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-ai-coverage-${{ runner.os }}-

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.70

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push agent branch
        run: |
          BRANCH="ai-coverage-agent/weekly-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

      - name: Run tests and generate JaCoCo coverage reports
        # Use -Pnostyle to skip style checks; exclude benchmarks as they are not unit tests.
        # JaCoCo XML reports are written to each module's target/site/jacoco/jacoco.xml.
        # These reports are the input data for Claude in the next step.
        run: mvn package -Pnostyle -DexcludedGroups=adhoc-benchmark --file pom.xml --batch-mode

      - name: Build Claude prompt
        # CLAUDE.md (auto-loaded by the CLI) carries base conventions.
        # CLAUDE-COVERAGE.MD carries coverage-specific instructions.
        # This prompt only needs to specify the target scope for this run.
        run: |
          MODULE="${{ github.event.inputs.target_module }}"
          if [ -n "$MODULE" ]; then
            SCOPE="${MODULE}/src"
          else
            SCOPE="src"
          fi

          cat > /tmp/coverage-prompt.txt << EOF
          Read and follow CLAUDE-COVERAGE.MD.
          Use the JaCoCo XML reports under ./**/target/site/jacoco/jacoco.xml to identify
          classes with the lowest branch and instruction coverage ratios.
          Add tests to improve coverage for at most 20 classes under ${SCOPE}.
          Do NOT commit.
          EOF

      - name: Run Claude AI review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude --dangerously-skip-permissions -p "$(cat /tmp/coverage-prompt.txt)"

      - name: Re-apply Spotless (safety net for any formatter drift)
        run: mvn spotless:apply --file pom.xml --batch-mode

      - name: Verify new tests compile and pass
        # Re-run the full test suite to ensure the new tests are green and that
        # JaCoCo coverage thresholds are still met.
        run: mvn package -Pnostyle -DexcludedGroups=adhoc-benchmark --file pom.xml --batch-mode

      - name: Detect and commit changes
        id: detect-changes
        run: |
          # Use git status --porcelain to detect both modifications AND new untracked
          # test files, which git diff --quiet alone would miss.
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add -A
            git commit -m "test: AI coverage improvements via Claude [skip ci]"
            git push origin HEAD
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2 ── Open a PR if the AI job produced changes ────────────────────────
  open-pr:
    name: Open PR
    needs: ai-coverage
    runs-on: ubuntu-latest
    if: ${{ !failure() && !cancelled() && needs.ai-coverage.outputs.changed == 'true' }}
    permissions:
      pull-requests: write
      issues: write  # required by gh label create

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master

      - name: Create ai-coverage label (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ai-coverage \
            --color 22C55E \
            --description "Changes made by the AI coverage agent" \
            || true

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-coverage-agent/weekly-${{ github.run_id }}"
          gh pr create \
            --title "test: AI coverage improvements (run ${{ github.run_id }})" \
            --body "$(cat <<'EOF'
          ## Summary

          Automated PR from the [AI Coverage Agent](https://github.com/solven-eu/adhoc/actions/runs/${{ github.run_id }}) (run `${{ github.run_id }}`).

          ### Changes may include
          - New `*Test.java` classes for production classes with low JaCoCo branch or instruction coverage
          - Additional test methods in existing test classes targeting uncovered branches
          - Tests written with JUnit 5 (`@Test`, `@ParameterizedTest`) and AssertJ assertions

          ### Review checklist
          - [ ] CI passes (Build, Spotless, Static Analysis)
          - [ ] New tests assert meaningful behaviour (not trivial getters or tautological assertions)
          - [ ] JaCoCo coverage metrics have improved or stayed the same
          EOF
          )" \
            --base master \
            --head "$BRANCH" \
            --label ai-coverage
