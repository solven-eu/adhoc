# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build & UnitTests

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
permissions: read-all

jobs:
  build:
    name: Build & UnitTests
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error == true }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: ['25', '26-ea']

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'temurin'
    # Workflow-scoped cache avoids cross-workflow cache pollution.
    # See https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows
    - name: Cache Maven local repository
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2/repository
        key: maven-build-${{ runner.os }}-java${{ matrix.java-version }}-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          maven-build-${{ runner.os }}-java${{ matrix.java-version }}-
    - name: Download dependencies
      run: mvn dependency:collect --file pom.xml --batch-mode
      # This is useful not to clutter the package command with download logs
      # `mvn dependency` has issues with multi-modules
      # run: mvn dependency:resolve dependency:resolve-plugins --batch-mode
    - name: Package skipping tests
      run: mvn package -Pfast --file pom.xml --batch-mode
    - name: Java unit-tests
      # Stick to `package` phase for consistency, and checking packaging is fine
      run: mvn package -Pnostyle -DexcludedGroups=adhoc-benchmark --file pom.xml --batch-mode

    # https://stackoverflow.com/questions/57498605/github-actions-share-workspace-artifacts-between-jobs
    #- uses: actions/upload-artifact@v4
    #  with:
    #    name: pivotable-server
    #    path: server/target/*-exec.jar

    - name: Report low-coverage classes
      # Informational only — highlights production classes below 20% instruction coverage.
      # Full list: https://sonarcloud.io/component_measures?metric=uncovered_lines&view=list&id=adhoc
      if: matrix.java-version == '25' && matrix.os == 'ubuntu-latest'
      run: perl scripts/check-coverage-low.pl . || true

    - name: Check coverage constraints
      # Informational only — compares per-module JaCoCo thresholds (from pom.xml) with actual coverage.
      if: matrix.java-version == '25' && matrix.os == 'ubuntu-latest'
      run: perl scripts/check-coverage-constraints.pl . || true

    - name: Upload coverage reports to Codecov
      if: matrix.java-version == '25' && matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
          token: ${{ secrets.CODECOV_TOKEN }}

    # https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/ci-based-analysis/github-actions-for-sonarcloud/
    - name: SonarQubeScan
      if: matrix.java-version == '25' && matrix.os == 'ubuntu-latest'
      uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
      env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
