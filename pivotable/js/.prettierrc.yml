# https://prettier.io/docs/en/configuration.html

# Use tabs to match the Biome default applied by Spotless — otherwise prettier
# and spotless/biome fight each other (prettier writes 4 spaces, biome rewrites
# to tabs on `mvn spotless:apply`, so whichever tool ran last wins).
useTabs: true
tabWidth: 4
printWidth: 160

overrides:
    # // https://github.com/prettier/prettier/issues/5892#issuecomment-466318688
    - files: "*.html"
      options:
          parser: html
    - files:
          - "*.vue"
      options:
          parser: vue
