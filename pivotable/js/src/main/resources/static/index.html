<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="description" content="Adhoc Homepage" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<base href="/" />
		<!--
			Resource source switcher. Two independent URL flags, fully client-side (no
			server-side HTML rewriting):
			  - `?cdn` : flip the source from LOCAL WebJars (served by Spring Boot at
			    `/webjars/*`) to jsdelivr's WebJars mirror. Default = webjars, keeping the SPA
			    self-hosted and CDN-free out of the box — safe in enterprise / air-gapped
			    environments.
			  - `?dev` : flip MINIFIED / `.prod.js` builds to the full / source-readable
			    variants. Default = minified, so end users get the smallest payload; pass
			    `?dev` for DevTools work where you need readable sources and named symbols.

			The cross-product gives four loadable states, each backed by a static importmap:
			  /ui/importmap-webjars-min.json  (default)
			  /ui/importmap-webjars.json      (?dev)
			  /ui/importmap-cdn-min.json      (?cdn)
			  /ui/importmap-cdn.json          (?cdn&dev)

			Stylesheets are injected below via a synchronous bootstrap script; the importmap
			is loaded externally via `document.write`, which emits the right tag inline before
			module-scripts execute.

			URL convention (both modes embed the version explicitly):
			  - local  : /webjars/<artifact>/<version>/<path>
			  - CDN    : https://cdn.jsdelivr.net/webjars/<groupId>/<artifact>/<version>/<path>
			Both paths resolve to the SAME file from the SAME WebJar — jsdelivr serves Maven
			Central artefacts over its CDN. Only the hostname differs; the content, path shape
			and version are identical. Embedding the version in every URL is what makes it safe
			for the backend to apply a far-future `Cache-Control: immutable` header (see
			PivotableWebjarsCachingWebFluxConfigurer / PivotableWebjarsCachingWebmvcConfigurer):
			a version bump changes the URL, invalidating the cache naturally.

			External-src importmap requires Chrome 127+ / Firefox 139+ / Safari (future). Safari
			users should fall back to the default webjars mode and may need a recent version.

			When adding a library:
			  - add the matching `<groupId>:<artifact>:<version>` dep in pivotable/js/pom.xml;
			  - add the SAME version in ALL FOUR `/ui/importmap-*.json` files — the embedded
			    version forces explicit alignment (a drift between pom.xml and the importmaps
			    becomes immediately visible rather than silently diverging).
		-->
		<script>
			(function () {
				// Two independent URL flags drive which assets the SPA loads:
				//   - `?cdn`  : swap the default local WebJars for jsdelivr's WebJars mirror.
				//   - `?dev`  : swap minified/.prod builds for the full / source-readable
				//               variants. Default is MINIFIED so end-users get the smallest
				//               payload; pass `?dev` for DevTools work.
				// Their cross-product selects one of four importmap JSON files under `/ui/`.
				const params = new URLSearchParams(location.search);
				const useCdn = params.has("cdn");
				const useDev = params.has("dev");
				const useWebjars = !useCdn;
				const useMin = !useDev;

				// Stylesheets. Each row lists up to four variants: full/min × cdn/webjars.
				// When a min variant is missing, we fall back to the full URL so the page
				// still renders (a missing .min.css would otherwise yield a 404 and unstyled
				// markup). Previously driven by the server-side `minifyHtml` in
				// PivotableSpaRouter / PivotableSpaController — now fully client-driven.
				const STYLESHEETS = [
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars/bootstrap/5.3.8/css/bootstrap.css",
						cdnMin: "https://cdn.jsdelivr.net/webjars/org.webjars/bootstrap/5.3.8/css/bootstrap.min.css",
						webjars: "/webjars/bootstrap/5.3.8/css/bootstrap.css",
						webjarsMin: "/webjars/bootstrap/5.3.8/css/bootstrap.min.css",
					},
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css",
						webjars: "/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css",
					},
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/slickgrid/5.18.2/dist/styles/css/slick.columnpicker.css",
						webjars: "/webjars/slickgrid/5.18.2/dist/styles/css/slick.columnpicker.css",
					},
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/slickgrid/5.18.2/dist/styles/css/slick-alpine-theme.css",
						webjars: "/webjars/slickgrid/5.18.2/dist/styles/css/slick-alpine-theme.css",
					},
				];
				for (const s of STYLESHEETS) {
					let href;
					if (useWebjars) {
						href = (useMin && s.webjarsMin) || s.webjars || s.cdn;
					} else {
						href = (useMin && s.cdnMin) || s.cdn || s.webjars;
					}
					if (!href) continue;
					const link = document.createElement("link");
					link.rel = "stylesheet";
					link.type = "text/css";
					link.href = href;
					document.head.appendChild(link);
				}

				// Emit the importmap synchronously BEFORE any module script is parsed.
				// Implementation: fetch the JSON via a synchronous XHR and attach it as an
				// inline importmap tag via DOM appendChild. Two earlier approaches were tried
				// and rejected:
				//   1. External-src importmap injected via document.write — Chromium has long-
				//      standing bugs where the map is not registered before subsequent module
				//      scripts resolve their imports. Symptom: "Failed to resolve module
				//      specifier" followed by "Unexpected token '<'" when the bare "vue"
				//      import falls back to fetching "/" and tries to parse HTML as JS.
				//   2. Inline importmap via document.write — same race condition, plus extra
				//      string-escaping headaches.
				// Synchronous XHR is deprecated but still supported and is the safest way to
				// GUARANTEE the map is in place before any later module script runs.
				//
				// IMPORTANT: do not write the literal "less-than + script" or "less-than +
				// slash + script" sequence anywhere in this inline JS — Vite's HTML
				// preprocessor recognises that token even inside JS comments and tries to
				// treat it as a real script tag, which corrupts the served HTML.
				//
				// Four importmap files live under /ui/, one per (cdn/webjars) × (full/min)
				// combination. The matrix is resolved here rather than server-side so all
				// configuration is visible in a single place and debuggable from DevTools.
				let importmapUrl;
				if (useWebjars) {
					importmapUrl = useMin ? "/ui/importmap-webjars-min.json" : "/ui/importmap-webjars.json";
				} else {
					importmapUrl = useMin ? "/ui/importmap-cdn-min.json" : "/ui/importmap-cdn.json";
				}
				// In Vite dev-server mode the bootstrap MUST keep the importmap pointed at LOCAL
				// /webjars/* URLs, regardless of the `?cdn` flag. Detection: Vite injects
				// `<script type="module" src="/@vite/client">` at the TOP of <head>.
				//
				// Why: the inline `<script type="module">` below uses bare specifiers
				// (`import "vue"` …), so an importmap IS needed even in dev. But Vite's
				// `importmapExternalsPlugin` rewrites those same specifiers (in modules served
				// from /ui/js/) to absolute local /webjars/* URLs. If our importmap pointed at
				// jsdelivr CDN URLs (under `?cdn`), the browser would speculatively fetch the
				// CDN copy of vue while Vite-served code uses the local one — two parallel
				// Vue runtimes, two reactivity systems, render crash on first mount with
				// "Cannot read properties of null (reading 'refs')". Forcing webjars-min in
				// dev keeps both paths aligned. In production (Spring Boot serving the static
				// file with no Vite transform), the user's `?cdn` choice is honoured.
				const isViteDev = !!document.querySelector('script[src="/@vite/client"]');
				const effectiveImportmapUrl = isViteDev ? "/ui/importmap-webjars-min.json" : importmapUrl;
				try {
					const xhr = new XMLHttpRequest();
					// `false` = synchronous. Required so the importmap is applied before any
					// later module script resolves its imports.
					xhr.open("GET", effectiveImportmapUrl, false);
					xhr.send(null);
					if (xhr.status >= 200 && xhr.status < 300) {
						// Build the importmap script via DOM rather than document.write. Chromium
						// has long-standing bugs where document.write of an importmap script does
						// not register the map before subsequent module scripts resolve their
						// imports — the symptom is "Failed to resolve module specifier" and a
						// follow-up "Unexpected token '<'" when the bare "vue" import falls back
						// to fetching "/" and tries to parse the HTML as JS. appendChild before
						// any later module script tag works because module scripts are deferred:
						// they wait for parsing of the surrounding document to complete, by which
						// time this synchronous bootstrap has already attached the map.
						const s = document.createElement("script");
						s.type = "importmap";
						s.textContent = xhr.responseText;
						document.head.appendChild(s);
					} else {
						console.error("Importmap fetch failed", effectiveImportmapUrl, xhr.status);
					}
				} catch (e) {
					console.error("Importmap fetch error", effectiveImportmapUrl, e);
				}

				// Expose which mode is active — surfaced under window.__adhocResourceMode /
				// .__adhocMinified for easy inspection from DevTools or browser-automation tests.
				window.__adhocResourceMode = useWebjars ? "webjars" : "cdn";
				window.__adhocMinified = useMin;
				window.__adhocDev = useDev;
			})();
		</script>

		<title>Pivotable (Adhoc)</title>

		<style>
			/* https://stackoverflow.com/questions/64181300/view-port-height-is-not-working-in-bootstrap */
			.vh-50 {
				height: 50vh;
			}
			.vh-75 {
				height: 75vh;
			}
			/* https://github.com/6pac/SlickGrid/blob/master/examples/example-0031-row-span-employees.html */
			.slickgrid-grid {
				--alpine-odd-row-color: #fff;
				--alpine-cell-border-width: 0 1px 1px 0;
				/* --alpine-row-mouse-hover-color: transparent; */
			}
			.slick-cell {
				/* Not flex else measures a left-eligned while we want them right-aligned */
				/* display: flex; */
				align-items: center;
				/* justify-content: center; */
				/*background-color: lightblue;*/
			}

			/*
			 * Submit block transition — animates the block between its docked position (below
			 * the wizard, bottom-left of the screen) and its floating position (centered over
			 * the grid when any wizard accordion is open). Driven by Vue
			 * <Transition name="submit-float"> + mode="out-in" + :key="accordionState.isOpen"
			 * in adhoc-query-executor.js.
			 *
			 * The floating-side enter/leave keyframes start/end near the BOTTOM-LEFT of the
			 * viewport — this is where the block lives in its docked position, so the motion
			 * reads as "the Submit block flew up from the sidebar to the center of the grid"
			 * (and the reverse on close). Position (static <-> fixed) cannot literally be
			 * interpolated, so this is a directional hint rather than a physically-accurate
			 * fly-over, but it reads correctly to the eye.
			 */
			/*
			 * Animate ONLY the floating side. Entering the docked state (no .position-fixed)
			 * has no transition and no hidden "from" state, so the Submit button appears
			 * instantly under the wizard the moment the leave animation of the floating
			 * overlay completes — instead of paying a second 0.3s for a fade-in nobody asked
			 * for.
			 */
			.submit-float-enter-active.position-fixed,
			.submit-float-leave-active.position-fixed {
				transition:
					opacity 0.3s ease,
					transform 0.3s ease;
			}
			.submit-float-enter-from.position-fixed,
			.submit-float-leave-to.position-fixed {
				opacity: 0;
				/*
				 * Compose the centering transform with a (−50vw, +40vh) offset and a scale-down
				 * so the element starts/ends roughly at the bottom-left of the screen (where
				 * the docked position sits — below the wizard accordion). The inline
				 * `transform: translate(-50%, -50%)` on the final state is overridden here via
				 * `!important` during the transition.
				 */
				transform: translate(-50%, -50%) translate(-50vw, 40vh) scale(0.6) !important;
			}

			/* Splash: visible while the bootstrap + SPA boot. Removed once Vue mounts. Inline-styled
			   (no Bootstrap dep) because the page renders this BEFORE Bootstrap CSS resolves. */
			#adhoc-splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1rem;
				background: #fff;
				font-family:
					system-ui,
					-apple-system,
					"Segoe UI",
					sans-serif;
				color: #6c757d;
				z-index: 99999;
			}
			#adhoc-splash .splash-spinner {
				width: 3rem;
				height: 3rem;
				border: 4px solid #dee2e6;
				border-top-color: #0d6efd;
				border-radius: 50%;
				animation: adhoc-splash-spin 0.8s linear infinite;
			}
			@keyframes adhoc-splash-spin {
				to {
					transform: rotate(360deg);
				}
			}
			#adhoc-splash.adhoc-splash-fading {
				opacity: 0;
				pointer-events: none;
				transition: opacity 0.2s ease-out;
			}
			/* Error / stall surface inside the splash. Hidden until something goes wrong, at
			   which point JS toggles the .has-error modifier on the splash root. */
			#adhoc-splash .splash-error {
				display: none;
				max-width: 36rem;
				padding: 1rem 1.25rem;
				border: 1px solid #f5c2c7;
				background: #f8d7da;
				color: #842029;
				border-radius: 0.5rem;
				font-size: 0.85rem;
				line-height: 1.4;
			}
			#adhoc-splash.has-error .splash-spinner {
				display: none;
			}
			#adhoc-splash.has-error .splash-label {
				color: #842029;
				font-weight: 600;
			}
			#adhoc-splash.has-error .splash-error {
				display: block;
			}
			#adhoc-splash .splash-error pre {
				white-space: pre-wrap;
				word-break: break-word;
				margin: 0.5rem 0 0;
				font-size: 0.75rem;
				max-height: 12rem;
				overflow: auto;
			}
			#adhoc-splash .splash-error button {
				margin-top: 0.75rem;
				margin-right: 0.5rem;
				padding: 0.25rem 0.75rem;
				border: 1px solid #842029;
				background: transparent;
				color: #842029;
				border-radius: 0.25rem;
				font: inherit;
				cursor: pointer;
			}
			#adhoc-splash .splash-error button:hover {
				background: #842029;
				color: #fff;
			}
			/* Progress bar underneath the spinner — driven by counted module fetches. */
			#adhoc-splash .splash-progress {
				width: 16rem;
				height: 0.4rem;
				background: #e9ecef;
				border-radius: 0.2rem;
				overflow: hidden;
			}
			#adhoc-splash .splash-progress-bar {
				height: 100%;
				width: 0%;
				background: #0d6efd;
				transition: width 0.15s ease-out;
			}
			#adhoc-splash .splash-progress-label {
				font-size: 0.75rem;
				color: #adb5bd;
				font-variant-numeric: tabular-nums;
			}
		</style>
	</head>
	<body>
		<!--
			The importmap lives in four static JSON files at `/ui/importmap-{webjars,cdn}{,-min}.json`,
			loaded as an external importmap script tag by the bootstrap block in <head>. See the
			comment above that script for the full contract.
			References:
			  - https://vuejs.org/guide/quick-start
			  - https://github.com/vuejs/router/issues/694
			  - https://github.com/vuejs/pinia/issues/2205
			  - https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/crossorigin
			  - https://github.com/WICG/import-maps/issues/76
			  - https://github.com/jsdelivr/jsdelivr/issues/18038
		-->
		<!--
			Splash screen — visible from page parse until the SPA mounts. Stays up while the
			bootstrap fetches the importmap, while module scripts download, and while Vue
			Router resolves the first route. Removed by the inline module script below as
			soon as `app.mount()` returns.
		-->
		<div id="adhoc-splash" role="status" aria-live="polite">
			<div class="splash-spinner" aria-hidden="true"></div>
			<div class="splash-label">Loading Pivotable…</div>
			<div class="splash-progress" aria-hidden="true">
				<div class="splash-progress-bar" id="adhoc-splash-bar"></div>
			</div>
			<div class="splash-progress-label" id="adhoc-splash-progress-label">0 / 0</div>
			<div class="splash-error" id="adhoc-splash-error" role="alert">
				<strong id="adhoc-splash-error-title">Pivotable failed to start.</strong>
				<pre id="adhoc-splash-error-detail"></pre>
				<button type="button" onclick="location.reload()">Reload</button>
				<button type="button" onclick="location.search = ''">Reset query</button>
			</div>
		</div>
		<script>
			// Splash watchdog + progress tracker. Three jobs:
			//   1. Count fetch / XHR / dynamic-import requests started since boot vs requests
			//      finished, and update the splash progress bar accordingly. The total is a
			//      moving target (each new fetch bumps it), so the bar represents "fraction of
			//      currently-known requests that have completed". Good enough for a "things are
			//      happening, here is the cadence" cue.
			//   2. Watch for boot stalls — if app.mount() has not torn down the splash within
			//      30s, surface "Pivotable failed to start" with a Reload button.
			//   3. Capture any uncaught error / unhandledrejection and surface its message
			//      inside the splash, so the user sees an actionable failure instead of an
			//      eternal spinner. The same handlers stay installed after boot but become
			//      no-ops once the splash is removed.
			(function () {
				let started = 0;
				let finished = 0;
				const bar = document.getElementById("adhoc-splash-bar");
				const label = document.getElementById("adhoc-splash-progress-label");
				const splash = document.getElementById("adhoc-splash");

				const updateProgress = function () {
					if (!bar || !label) return;
					const pct = started === 0 ? 0 : Math.round((finished / started) * 100);
					bar.style.width = pct + "%";
					label.textContent = finished + " / " + started;
				};

				// Patch fetch — count starts when the call is made, finished when its promise settles.
				const origFetch = window.fetch;
				if (typeof origFetch === "function") {
					window.fetch = function () {
						started++;
						updateProgress();
						const p = origFetch.apply(this, arguments);
						p.then(
							() => {
								finished++;
								updateProgress();
							},
							() => {
								finished++;
								updateProgress();
							},
						);
						return p;
					};
				}

				// Patch XHR — only the SYNCHRONOUS bootstrap importmap fetch goes through here
				// today, but the patch is symmetric with fetch so any future XHR is captured.
				const OrigXHR = window.XMLHttpRequest;
				if (typeof OrigXHR === "function") {
					const PatchedXHR = function () {
						const xhr = new OrigXHR();
						const origSend = xhr.send;
						xhr.send = function () {
							started++;
							updateProgress();
							let done = false;
							const finish = function () {
								if (done) return;
								done = true;
								finished++;
								updateProgress();
							};
							xhr.addEventListener("loadend", finish);
							return origSend.apply(this, arguments);
						};
						return xhr;
					};
					PatchedXHR.prototype = OrigXHR.prototype;
					window.XMLHttpRequest = PatchedXHR;
				}

				// Surface a visible error inside the splash. Idempotent — only the FIRST error
				// is shown, so a cascade of follow-up failures does not overwrite the root cause.
				let errorShown = false;
				const showSplashError = function (title, detail) {
					if (!splash || errorShown) return;
					if (splash.classList.contains("adhoc-splash-fading")) return;
					errorShown = true;
					splash.classList.add("has-error");
					const t = document.getElementById("adhoc-splash-error-title");
					const d = document.getElementById("adhoc-splash-error-detail");
					if (t && title) t.textContent = title;
					if (d) d.textContent = detail || "";
				};

				window.addEventListener("error", (e) => {
					showSplashError("Pivotable failed to start", (e.error && e.error.stack) || e.message || "Unknown error");
				});
				window.addEventListener("unhandledrejection", (e) => {
					const reason = e.reason;
					const detail = reason && (reason.stack || reason.message || String(reason));
					showSplashError("Pivotable failed to start", detail || "Unhandled promise rejection");
				});

				// Stall watchdog — if the splash is still visible after 30s, assume boot is
				// wedged. We do NOT auto-reload (that would mask repeated failures); we just
				// flip the splash to its error state so the user can act.
				setTimeout(() => {
					if (!splash || splash.classList.contains("adhoc-splash-fading")) return;
					if (!document.body.contains(splash)) return;
					showSplashError(
						"Pivotable is taking too long to start",
						"Boot has not completed after 30 s. The Reload button retries; Reset query strips ?cdn / ?dev / etc.",
					);
				}, 30000);
			})();
		</script>

		<div id="app">
			<AdhocApp />
		</div>

		<script type="module">
			import { createApp, ref } from "vue";
			// https://router.vuejs.org/guide/essentials/history-mode
			import { createRouter, createWebHistory } from "vue-router";
			// https://pinia.vuejs.org/getting-started.html
			import { createPinia } from "pinia";

			import AdhocApp from "./ui/js/adhoc-app.js";
			import HelloView from "./ui/js/hello.js";
			import AdhocAccount from "./ui/js/adhoc-account.js";
			import AdhocMe from "./ui/js/adhoc-account-me.js";
			import AdhocEndpoints from "./ui/js/adhoc-endpoints.js";
			import AdhocEndpoint from "./ui/js/adhoc-endpoint.js";
			import AdhocCube from "./ui/js/adhoc-cube.js";
			import AdhocWrapperQuery from "./ui/js/adhoc-wrapper-query.js";
			import Login from "./ui/js/login.js";
			import LoginBasic from "./ui/js/login-basic.js";
			import AboutView from "./ui/js/about.js";

			// Some routes prefix are forbidden as they would match API
			// It includes `/ui`, `/api`
			const routes = [
				{ path: "/", component: HelloView },
				{
					path: "/html/me",
					component: AdhocMe,
					props: true,
				},
				{
					path: "/html/accounts/:accountId",
					component: AdhocAccount,
					props: true,
				},
				{
					path: "/html/login",
					component: Login,
					// https://stackoverflow.com/questions/44783787/bind-query-to-props-with-vue-router
					// props: route => Object.assign({}, route.query, route.params)
					props: (route) => ({
						// On loginSuccess, Spring redirects to `/login?success`
						success: route.query.success === null ? true : false,
						// On loginSuccess, Spring redirects to `/login?logout`
						logout: route.query.logout === null ? true : false,
					}),
				},
				{
					path: "/html/login/basic",
					component: LoginBasic,
					// https://stackoverflow.com/questions/44783787/bind-query-to-props-with-vue-router
					// props: route => Object.assign({}, route.query, route.params)
				},
				{ path: "/html/endpoints", component: AdhocEndpoints },
				// https://router.vuejs.org/guide/essentials/passing-props
				{
					path: "/html/endpoints/:endpointId",
					component: AdhocEndpoint,
					props: true,
				},
				{
					path: "/html/endpoints/:endpointId/schema",
					component: AdhocEndpoint,
					props: (route) => ({
						endpointId: route.params.endpointId,
						showSchema: true,
					}),
				},
				{
					path: "/html/endpoints/:endpointId/cubes/:cubeId",
					component: AdhocCube,
					props: (route) => ({
						cubeId: route.params.cubeId,
						endpointId: route.params.endpointId,
						showSchema: false,
					}),
				},
				{
					path: "/html/endpoints/:endpointId/cubes/:cubeId/query",
					component: AdhocWrapperQuery,
					props: (route) => ({
						cubeId: route.params.cubeId,
						endpointId: route.params.endpointId,
					}),
				},
			];

			const router = createRouter({
				history: createWebHistory(),
				routes,
			});

			const pinia = createPinia();

			// https://router.vuejs.org/guide/
			const app = createApp(AdhocApp);

			app.use(router)
				// https://pinia.vuejs.org/getting-started.html
				.use(pinia);

			// https://github.com/vuejs/router/issues/2017
			// https://router.vuejs.org/guide/migration/#All-navigations-are-now-always-asynchronous
			router.isReady().then(() => {
				app.mount("#app");
				// Bootstrap is finished, the SPA has rendered its first frame. Tear down the
				// splash with a short fade so the transition feels intentional rather than
				// "flash of unstyled content". `requestAnimationFrame` defers one tick so the
				// browser commits the freshly-mounted DOM before we start fading.
				requestAnimationFrame(() => {
					const splash = document.getElementById("adhoc-splash");
					if (!splash) return;
					splash.classList.add("adhoc-splash-fading");
					setTimeout(() => splash.remove(), 250);
				});
			});
		</script>
		<!-- This demonstrate how we can inject properties into source files, to be rendered without any API/Javascript-->
		<!-- https://stackoverflow.com/questions/39099295/make-div-stick-to-bottom-of-page -->
		<div style="position: fixed; bottom: 0; width: 100%; text-align: right; z-index: -1">
			<a href="https://github.com/solven-eu/adhoc/commit/@git.commit.id.abbrev@" target="_blank">
				<img src="./ui/img/github-mark.svg" alt="Github" width="32" height="32" />
			</a>
		</div>
	</body>
</html>
