<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="description" content="Adhoc Homepage" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<base href="/" />
		<!--
			Resource source switcher. Default mode is LOCAL WebJars (served by Spring Boot at
			`/webjars/*`), keeping the SPA self-hosted and CDN-free by default — safe in
			enterprise / air-gapped environments. Pass `?cdn` in the URL to load every library
			from jsdelivr's WebJars mirror instead — handy for quickly verifying a fresh
			checkout before the backend is built, or when the local WebJar cache is stale.

			The switch is done synchronously here, BEFORE any module script executes. Module
			scripts are deferred by the HTML parser, so injecting an importmap via `appendChild`
			in the head is still in time for the first `import` resolution.

			URL convention (both modes):
			  - local  : /webjars/<artifact>/<path>   (webjars-locator-core resolves the version
			             transparently at the Spring Boot layer)
			  - CDN    : https://cdn.jsdelivr.net/webjars/<groupId>/<artifact>/<version>/<path>
			Both paths resolve to the SAME file from the SAME WebJar — jsdelivr serves Maven
			Central artefacts over its CDN. This means the two modes serve byte-identical
			content; the only difference is the hostname and whether the version is spelled
			out in the URL.

			When adding a library:
			  - add the matching `<groupId>:<artifact>:<version>` dep in pivotable/js/pom.xml;
			  - pin the SAME version in the CDN URL below — the embedded version forces
			    explicit alignment (a drift between pom.xml and index.html becomes immediately
			    visible rather than silently diverging).
		-->
		<script>
			(function () {
				// Default = local WebJars. `?cdn` flips to jsdelivr's WebJars mirror.
				const useCdn = new URLSearchParams(location.search).has("cdn");
				const useWebjars = !useCdn;

				// Stylesheets. Both `cdn` and `webjars` point at the same WebJar file; only the
				// host (jsdelivr vs. local Spring Boot) differs.
				const STYLESHEETS = [
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars/bootstrap/5.3.8/css/bootstrap.css",
						webjars: "/webjars/bootstrap/css/bootstrap.css",
					},
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css",
						webjars: "/webjars/bootstrap-icons/font/bootstrap-icons.min.css",
					},
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/slickgrid/5.18.2/dist/styles/css/slick.columnpicker.css",
						webjars: "/webjars/slickgrid/dist/styles/css/slick.columnpicker.css",
					},
					{
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/slickgrid/5.18.2/dist/styles/css/slick-alpine-theme.css",
						webjars: "/webjars/slickgrid/dist/styles/css/slick-alpine-theme.css",
					},
				];
				for (const s of STYLESHEETS) {
					const href = useWebjars ? s.webjars || s.cdn : s.cdn || s.webjars;
					if (!href) continue;
					const link = document.createElement("link");
					link.rel = "stylesheet";
					link.type = "text/css";
					link.href = href;
					document.head.appendChild(link);
				}

				// Importmap. Keys must match the `import "<name>"` specifiers used by the SPA.
				// `@popperjs/core` → WebJar artifact `popperjs__core` (double underscore is the
				// WebJars convention for scoped npm packages).
				// `lodash-es` has no convenient bundled ESM WebJar; we point at the main
				// `lodash.js` entry which re-exports everything the SPA uses.
				const IMPORTS = {
					vue: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/vue/3.5.32/dist/vue.esm-browser.js",
						webjars: "/webjars/vue/dist/vue.esm-browser.js",
					},
					"vue-router": {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/vue-router/4.6.3/dist/vue-router.esm-browser.js",
						webjars: "/webjars/vue-router/dist/vue-router.esm-browser.js",
					},
					"@vue/devtools-api": {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/vue__devtools-api/6.6.4/lib/esm/index.js",
						webjars: "/webjars/vue__devtools-api/lib/esm/index.js",
					},
					pinia: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/pinia/3.0.4/dist/pinia.esm-browser.js",
						webjars: "/webjars/pinia/dist/pinia.esm-browser.js",
					},
					"vue-demi": {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/vue-demi/0.14.10/lib/v3/index.mjs",
						webjars: "/webjars/vue-demi/lib/v3/index.mjs",
					},
					bootstrap: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars/bootstrap/5.3.8/js/bootstrap.esm.js",
						webjars: "/webjars/bootstrap/js/bootstrap.esm.js",
					},
					"@popperjs/core": {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/popperjs__core/2.11.8/dist/esm/index.js",
						webjars: "/webjars/popperjs__core/dist/esm/index.js",
					},
					slickgrid: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/slickgrid/5.18.2/dist/esm/index.mjs",
						webjars: "/webjars/slickgrid/dist/esm/index.mjs",
					},
					sortablejs: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/sortablejs/1.15.7/modular/sortable.esm.js",
						webjars: "/webjars/sortablejs/modular/sortable.esm.js",
					},
					lodashEs: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/lodash-es/4.17.21/lodash.js",
						webjars: "/webjars/lodash-es/lodash.js",
					},
					mermaid: {
						cdn: "https://cdn.jsdelivr.net/webjars/org.webjars.npm/mermaid/11.6.0/dist/mermaid.esm.mjs",
						webjars: "/webjars/mermaid/dist/mermaid.esm.mjs",
					},
				};

				const imports = {};
				for (const key of Object.keys(IMPORTS)) {
					imports[key] = useWebjars ? IMPORTS[key].webjars : IMPORTS[key].cdn;
				}

				const mapTag = document.createElement("script");
				mapTag.type = "importmap";
				mapTag.setAttribute("crossorigin", "anonymous");
				mapTag.textContent = JSON.stringify({ imports });
				document.head.appendChild(mapTag);

				// Expose which mode is active — surfaced under window.__adhocResourceMode for
				// easy inspection from DevTools or browser-automation tests.
				window.__adhocResourceMode = useWebjars ? "webjars" : "cdn";
			})();
		</script>

		<title>Pivotable (Adhoc)</title>

		<style>
			/* https://stackoverflow.com/questions/64181300/view-port-height-is-not-working-in-bootstrap */
			.vh-50 {
				height: 50vh;
			}
			.vh-75 {
				height: 75vh;
			}
			/* https://github.com/6pac/SlickGrid/blob/master/examples/example-0031-row-span-employees.html */
			.slickgrid-grid {
				--alpine-odd-row-color: #fff;
				--alpine-cell-border-width: 0 1px 1px 0;
				/* --alpine-row-mouse-hover-color: transparent; */
			}
			.slick-cell {
				/* Not flex else measures a left-eligned while we want them right-aligned */
				/* display: flex; */
				align-items: center;
				/* justify-content: center; */
				/*background-color: lightblue;*/
			}

			/*
			 * Submit block transition — animates the block between its docked position (below
			 * the wizard, bottom-left of the screen) and its floating position (centered over
			 * the grid when any wizard accordion is open). Driven by Vue
			 * <Transition name="submit-float"> + mode="out-in" + :key="accordionState.isOpen"
			 * in adhoc-query-executor.js.
			 *
			 * The floating-side enter/leave keyframes start/end near the BOTTOM-LEFT of the
			 * viewport — this is where the block lives in its docked position, so the motion
			 * reads as "the Submit block flew up from the sidebar to the center of the grid"
			 * (and the reverse on close). Position (static <-> fixed) cannot literally be
			 * interpolated, so this is a directional hint rather than a physically-accurate
			 * fly-over, but it reads correctly to the eye.
			 */
			/*
			 * Animate ONLY the floating side. Entering the docked state (no .position-fixed)
			 * has no transition and no hidden "from" state, so the Submit button appears
			 * instantly under the wizard the moment the leave animation of the floating
			 * overlay completes — instead of paying a second 0.3s for a fade-in nobody asked
			 * for.
			 */
			.submit-float-enter-active.position-fixed,
			.submit-float-leave-active.position-fixed {
				transition:
					opacity 0.3s ease,
					transform 0.3s ease;
			}
			.submit-float-enter-from.position-fixed,
			.submit-float-leave-to.position-fixed {
				opacity: 0;
				/*
				 * Compose the centering transform with a (−50vw, +40vh) offset and a scale-down
				 * so the element starts/ends roughly at the bottom-left of the screen (where
				 * the docked position sits — below the wizard accordion). The inline
				 * `transform: translate(-50%, -50%)` on the final state is overridden here via
				 * `!important` during the transition.
				 */
				transform: translate(-50%, -50%) translate(-50vw, 40vh) scale(0.6) !important;
			}
		</style>
	</head>
	<body>
		<!--
			The importmap used to live here as a static `<script type="importmap">`. It is now
			generated dynamically by the bootstrap script in <head> so the SPA can switch between
			CDN and WebJars sources via `?webjars`. See the comment above that script for the
			full contract. References:
			  - https://vuejs.org/guide/quick-start
			  - https://github.com/vuejs/router/issues/694
			  - https://github.com/vuejs/pinia/issues/2205
			  - https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/crossorigin
			  - https://github.com/WICG/import-maps/issues/76
			  - https://github.com/jsdelivr/jsdelivr/issues/18038
		-->
		<div id="app">
			<AdhocApp />
		</div>

		<script type="module">
			import { createApp, ref } from "vue";
			// https://router.vuejs.org/guide/essentials/history-mode
			import { createRouter, createWebHistory } from "vue-router";
			// https://pinia.vuejs.org/getting-started.html
			import { createPinia } from "pinia";

			import AdhocApp from "./ui/js/adhoc-app.js";
			import HelloView from "./ui/js/hello.js";
			import AdhocAccount from "./ui/js/adhoc-account.js";
			import AdhocMe from "./ui/js/adhoc-account-me.js";
			import AdhocEndpoints from "./ui/js/adhoc-endpoints.js";
			import AdhocEndpoint from "./ui/js/adhoc-endpoint.js";
			import AdhocCube from "./ui/js/adhoc-cube.js";
			import AdhocWrapperQuery from "./ui/js/adhoc-wrapper-query.js";
			import Login from "./ui/js/login.js";
			import LoginBasic from "./ui/js/login-basic.js";
			import AboutView from "./ui/js/about.js";

			// Some routes prefix are forbidden as they would match API
			// It includes `/ui`, `/api`
			const routes = [
				{ path: "/", component: HelloView },
				{
					path: "/html/me",
					component: AdhocMe,
					props: true,
				},
				{
					path: "/html/accounts/:accountId",
					component: AdhocAccount,
					props: true,
				},
				{
					path: "/html/login",
					component: Login,
					// https://stackoverflow.com/questions/44783787/bind-query-to-props-with-vue-router
					// props: route => Object.assign({}, route.query, route.params)
					props: (route) => ({
						// On loginSuccess, Spring redirects to `/login?success`
						success: route.query.success === null ? true : false,
						// On loginSuccess, Spring redirects to `/login?logout`
						logout: route.query.logout === null ? true : false,
					}),
				},
				{
					path: "/html/login/basic",
					component: LoginBasic,
					// https://stackoverflow.com/questions/44783787/bind-query-to-props-with-vue-router
					// props: route => Object.assign({}, route.query, route.params)
				},
				{ path: "/html/endpoints", component: AdhocEndpoints },
				// https://router.vuejs.org/guide/essentials/passing-props
				{
					path: "/html/endpoints/:endpointId",
					component: AdhocEndpoint,
					props: true,
				},
				{
					path: "/html/endpoints/:endpointId/schema",
					component: AdhocEndpoint,
					props: (route) => ({
						endpointId: route.params.endpointId,
						showSchema: true,
					}),
				},
				{
					path: "/html/endpoints/:endpointId/cubes/:cubeId",
					component: AdhocCube,
					props: (route) => ({
						cubeId: route.params.cubeId,
						endpointId: route.params.endpointId,
						showSchema: false,
					}),
				},
				{
					path: "/html/endpoints/:endpointId/cubes/:cubeId/query",
					component: AdhocWrapperQuery,
					props: (route) => ({
						cubeId: route.params.cubeId,
						endpointId: route.params.endpointId,
					}),
				},
			];

			const router = createRouter({
				history: createWebHistory(),
				routes,
			});

			const pinia = createPinia();

			// https://router.vuejs.org/guide/
			const app = createApp(AdhocApp);

			app.use(router)
				// https://pinia.vuejs.org/getting-started.html
				.use(pinia);

			// https://github.com/vuejs/router/issues/2017
			// https://router.vuejs.org/guide/migration/#All-navigations-are-now-always-asynchronous
			router.isReady().then(() => {
				app.mount("#app");
			});
		</script>
		<!-- This demonstrate how we can inject properties into source files, to be rendered without any API/Javascript-->
		<!-- https://stackoverflow.com/questions/39099295/make-div-stick-to-bottom-of-page -->
		<div style="position: fixed; bottom: 0; width: 100%; text-align: right; z-index: -1">
			<a href="https://github.com/solven-eu/adhoc/commit/@git.commit.id.abbrev@" target="_blank">
				<img src="./ui/img/github-mark.svg" alt="Github" width="32" height="32" />
			</a>
		</div>
	</body>
</html>
